<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Driving Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        .hud-text { text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #speedometer {
            background: radial-gradient(circle at center, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
        }
        .needle {
            transform-origin: bottom center;
            transition: transform 0.1s;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- HUD -->
<div class="fixed bottom-0 left-0 w-full p-6 pointer-events-none select-none">
    <div class="flex justify-between items-end">
        <!-- Speedometer -->
        <div class="glass-panel rounded-2xl p-6 text-white">
            <div class="relative w-48 h-48" id="speedometer">
                <svg class="w-full h-full" viewBox="0 0 100 100">
                    <!-- Arc -->
                    <path d="M 20 80 A 40 40 0 1 1 80 80" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round"/>
                    <path d="M 20 80 A 40 40 0 1 1 80 80" fill="none" stroke="#0f0" stroke-width="2" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="0" class="opacity-30"/>
                    
                    <!-- Ticks -->
                    <g id="ticks"></g>
                    
                    <!-- Needle -->
                    <line id="needle" x1="50" y1="50" x2="50" y2="20" stroke="#ff0000" stroke-width="2" class="needle" transform="rotate(-135 50 50)"/>
                    <circle cx="50" cy="50" r="3" fill="#fff"/>
                </svg>
                <div class="absolute bottom-4 left-0 w-full text-center">
                    <div class="text-3xl font-bold hud-text" id="speed-text">0</div>
                    <div class="text-xs text-gray-400">KM/H</div>
                </div>
            </div>
        </div>

        <!-- Controls Info -->
        <div class="glass-panel rounded-xl p-4 text-white text-sm space-y-1">
            <div class="font-bold text-green-400 mb-2">CONTROLS</div>
            <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-xs opacity-80">
                <div>W / ↑</div><div class="text-right text-yellow-300">Accelerate</div>
                <div>S / ↓</div><div class="text-right text-yellow-300">Brake/Reverse</div>
                <div>A / D / ← →</div><div class="text-right text-yellow-300">Steer</div>
                <div>H</div><div class="text-right text-yellow-300">Headlights</div>
            </div>
            <div class="mt-3 pt-3 border-t border-gray-600 text-xs">
                <div id="time-display" class="text-cyan-300 font-bold">12:00 PM</div>
                <div class="text-gray-400 text-[10px] mt-1">Day Cycle: 24h = 30m</div>
            </div>
        </div>
    </div>
</div>

<!-- Loading Screen -->
<div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="text-center">
        <div class="text-green-500 text-2xl mb-4 font-bold animate-pulse">GENERATING WORLD...</div>
        <div class="text-gray-500 text-sm">Loading assets & terrain</div>
    </div>
</div>

<script>
// Game Configuration
const CONFIG = {
    chunkSize: 200,
    viewDistance: 600,
    car: {
        maxSpeed: 180,
        acceleration: 80,
        braking: 120,
        friction: 0.98,
        turnSpeed: 2.5,
        mass: 1500
    },
    dayLength: 30 * 60 * 1000, // 30 minutes in ms for 24h
    fogDensity: 0.003
};

// Global Variables
let scene, camera, renderer;
let car, carBody, wheels = [];
let speed = 0, steering = 0;
let chunks = new Map();
let trees = [], buildings = [], fences = [], animals = [];
let simplex = new SimplexNoise();
let clock = new THREE.Clock();
let sunLight, ambientLight, moonLight;
let carLights = { left: null, right: null, spot: null };
let isNight = false;
let gameTime = 12 * 60 * 60 * 1000; // Start at noon (ms)
let headlightsOn = false;
let keys = {};

// Initialize
function init() {
    // Scene setup
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x87CEEB, CONFIG.fogDensity);
    
    // Camera
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 8);
    
    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    // Lighting
    setupLighting();
    
    // Create Car
    createCar();
    
    // Input handling
    setupInputs();
    
    // Generate initial world
    updateWorldChunks();
    
    // Hide loading
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
    }, 1000);
    
    // Start loop
    animate();
}

function setupLighting() {
    // Ambient
    ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    
    // Sun (Directional)
    sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(100, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 500;
    sunLight.shadow.camera.left = -100;
    sunLight.shadow.camera.right = 100;
    sunLight.shadow.camera.top = 100;
    sunLight.shadow.camera.bottom = -100;
    scene.add(sunLight);
    
    // Moon light (initially off)
    moonLight = new THREE.DirectionalLight(0x4444ff, 0);
    moonLight.position.set(-100, 100, -50);
    scene.add(moonLight);
}

function createCar() {
    car = new THREE.Group();
    
    // Materials
    const paintMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a1a, 
        metalness: 0.8, 
        roughness: 0.2,
        envMapIntensity: 1
    });
    const glassMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x111111, 
        metalness: 0.9, 
        roughness: 0.1,
        transparent: true,
        opacity: 0.9
    });
    const chromeMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xffffff, 
        metalness: 1.0, 
        roughness: 0.1 
    });
    const rubberMaterial = new THREE.MeshStandardMaterial({ 
        color: 0x111111, 
        roughness: 0.9 
    });
    const glowMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xffffff, 
        emissive: 0xffffff, 
        emissiveIntensity: 2 
    });
    const redGlowMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xff0000, 
        emissive: 0xff0000, 
        emissiveIntensity: 1 
    });
    
    // Car Body (Sedan shape)
    const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4.5);
    const body = new THREE.Mesh(bodyGeo, paintMaterial);
    body.position.y = 0.6;
    body.castShadow = true;
    body.receiveShadow = true;
    car.add(body);
    
    // Cabin
    const cabinGeo = new THREE.BoxGeometry(1.8, 0.5, 2.5);
    const cabin = new THREE.Mesh(cabinGeo, glassMaterial);
    cabin.position.set(0, 1.15, -0.2);
    cabin.castShadow = true;
    car.add(cabin);
    
    // Roof (top of cabin)
    const roofGeo = new THREE.BoxGeometry(1.85, 0.05, 2.3);
    const roof = new THREE.Mesh(roofGeo, paintMaterial);
    roof.position.set(0, 1.4, -0.2);
    car.add(roof);
    
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 24);
    wheelGeo.rotateZ(Math.PI / 2);
    
    const wheelPositions = [
        [-1, 0.35, 1.4], [1, 0.35, 1.4],
        [-1, 0.35, -1.4], [1, 0.35, -1.4]
    ];
    
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, rubberMaterial);
        wheel.position.set(...pos);
        wheel.castShadow = true;
        car.add(wheel);
        wheels.push(wheel);
        
        // Hubcap
        const hubcap = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.26, 16), chromeMaterial);
        hubcap.rotateZ(Math.PI / 2);
        wheel.add(hubcap);
    });
    
    // Headlights
    const headlightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
    const leftLight = new THREE.Mesh(headlightGeo, glowMaterial);
    leftLight.position.set(-0.6, 0.6, 2.25);
    car.add(leftLight);
    
    const rightLight = new THREE.Mesh(headlightGeo, glowMaterial);
    rightLight.position.set(0.6, 0.6, 2.25);
    car.add(rightLight);
    
    // Taillights
    const taillightGeo = new THREE.BoxGeometry(0.4, 0.2, 0.1);
    const leftTail = new THREE.Mesh(taillightGeo, redGlowMaterial);
    leftTail.position.set(-0.6, 0.6, -2.25);
    car.add(leftTail);
    
    const rightTail = new THREE.Mesh(taillightGeo, redGlowMaterial);
    rightTail.position.set(0.6, 0.6, -2.25);
    car.add(rightTail);
    
    // Headlight beams (Spotlights)
    carLights.left = new THREE.SpotLight(0xffffee, 0, 100, Math.PI / 4, 0.5, 1);
    carLights.left.position.set(-0.6, 0.6, 2.0);
    carLights.left.target.position.set(-0.6, 0, 10);
    car.add(carLights.left);
    car.add(carLights.left.target);
    
    carLights.right = new THREE.SpotLight(0xffffee, 0, 100, Math.PI / 4, 0.5, 1);
    carLights.right.position.set(0.6, 0.6, 2.0);
    carLights.right.target.position.set(0.6, 0, 10);
    car.add(carLights.right);
    car.add(carLights.right.target);
    
    // Grill
    const grill = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 0.05), chromeMaterial);
    grill.position.set(0, 0.5, 2.25);
    car.add(grill);
    
    // Bumpers
    const frontBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.2), chromeMaterial);
    frontBumper.position.set(0, 0.3, 2.3);
    car.add(frontBumper);
    
    const rearBumper = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 0.2), chromeMaterial);
    rearBumper.position.set(0, 0.3, -2.3);
    car.add(rearBumper);
    
    scene.add(car);
    carBody = body;
}

function setupInputs() {
    window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (e.key.toLowerCase() === 'h') toggleHeadlights();
    });
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
    window.addEventListener('resize', onWindowResize, false);
}

function toggleHeadlights() {
    headlightsOn = !headlightsOn;
    const intensity = headlightsOn ? 2 : 0;
    carLights.left.intensity = intensity;
    carLights.right.intensity = intensity;
}

function getChunkKey(x, z) {
    return `${Math.floor(x / CONFIG.chunkSize)},${Math.floor(z / CONFIG.chunkSize)}`;
}

function generateChunk(cx, cz) {
    const chunk = new THREE.Group();
    const xOffset = cx * CONFIG.chunkSize;
    const zOffset = cz * CONFIG.chunkSize;
    
    // Road
    const roadGeo = new THREE.PlaneGeometry(12, CONFIG.chunkSize);
    const roadMat = new THREE.MeshStandardMaterial({ 
        color: 0x333333, 
        roughness: 0.9 
    });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.set(0, 0.01, zOffset + CONFIG.chunkSize / 2);
    road.receiveShadow = true;
    chunk.add(road);
    
    // Road markings
    const lineGeo = new THREE.PlaneGeometry(0.3, CONFIG.chunkSize);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.set(0, 0.02, zOffset + CONFIG.chunkSize / 2);
    chunk.add(line);
    
    // Terrain noise for variety
    for (let i = 0; i < 30; i++) {
        const x = (Math.random() - 0.5) * CONFIG.chunkSize;
        const z = zOffset + Math.random() * CONFIG.chunkSize;
        const noise = simplex.noise2D(x * 0.01, z * 0.01);
        
        // Trees
        if (Math.abs(x) > 10 && noise > 0) {
            createTree(chunk, x, z, noise);
        }
        
        // Buildings
        if (Math.abs(x) > 40 && noise > 0.5 && Math.random() > 0.95) {
            createBuilding(chunk, x, z);
        }
        
        // Fences
        if (Math.abs(x) > 8 && Math.abs(x) < 12 && Math.random() > 0.7) {
            createFence(chunk, x > 0 ? 7 : -7, z);
        }
        
        // Animals
        if (Math.abs(x) > 15 && Math.random() > 0.995) {
            createAnimal(chunk, x, z);
        }
    }
    
    // Mountains in distance
    if (Math.random() > 0.7) {
        createMountain(chunk, (Math.random() - 0.5) * 200, zOffset + CONFIG.chunkSize / 2);
    }
    
    scene.add(chunk);
    return chunk;
}

function createTree(parent, x, z, noise) {
    const scale = 0.8 + Math.random() * 0.6;
    
    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.2 * scale, 0.3 * scale, 1.5 * scale, 8);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.9 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(x, 0.75 * scale, z);
    trunk.castShadow = true;
    parent.add(trunk);
    
    // Leaves (multiple layers)
    const leavesMat = new THREE.MeshStandardMaterial({ 
        color: noise > 0.5 ? 0x2d5016 : 0x3d6b1a,
        roughness: 0.8 
    });
    
    for (let i = 0; i < 3; i++) {
        const leavesGeo = new THREE.ConeGeometry((1.2 - i * 0.2) * scale, 1.5 * scale, 8);
        const leaves = new THREE.Mesh(leavesGeo, leavesMat);
        leaves.position.set(x, (1.5 + i * 0.8) * scale, z);
        leaves.castShadow = true;
        parent.add(leaves);
    }
}

function createBuilding(parent, x, z) {
    const width = 8 + Math.random() * 8;
    const height = 5 + Math.random() * 10;
    const depth = 8 + Math.random() * 8;
    
    const building = new THREE.Group();
    
    // Main structure
    const geo = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshStandardMaterial({ 
        color: Math.random() > 0.5 ? 0xcccccc : 0x8b7355,
        roughness: 0.7
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = height / 2;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    building.add(mesh);
    
    // Windows
    const windowGeo = new THREE.PlaneGeometry(1, 1.5);
    const windowMat = new THREE.MeshStandardMaterial({ 
        color: 0x444444,
        metalness: 0.9,
        roughness: 0.1
    });
    
    for (let i = 0; i < 3; i++) {
        for (let j = 1; j < height / 2; j++) {
            const win = new THREE.Mesh(windowGeo, windowMat);
            win.position.set((i - 1) * 2, j * 2, depth / 2 + 0.1);
            building.add(win);
        }
    }
    
    building.position.set(x, 0, z);
    parent.add(building);
}

function createFence(parent, x, z) {
    const postGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
    const postMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(x, 0.6, z);
    parent.add(post);
    
    if (Math.random() > 0.3) {
        const railGeo = new THREE.BoxGeometry(0.1, 0.1, 4);
        const rail = new THREE.Mesh(railGeo, postMat);
        rail.position.set(x, 1.0, z + 2);
        parent.add(rail);
        
        const rail2 = rail.clone();
        rail2.position.y = 0.7;
        parent.add(rail2);
    }
}

function createAnimal(parent, x, z) {
    const animal = new THREE.Group();
    
    // Simple deer/cow shape
    const bodyGeo = new THREE.BoxGeometry(0.8, 0.6, 1.2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.8;
    animal.add(body);
    
    // Head
    const headGeo = new THREE.BoxGeometry(0.4, 0.4, 0.5);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.set(0, 1.2, 0.7);
    animal.add(head);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8);
    const legPositions = [[-0.3, 0.4], [0.3, 0.4], [-0.3, -0.4], [0.3, -0.4]];
    
    legPositions.forEach(pos => {
        const leg = new THREE.Mesh(legGeo, bodyMat);
        leg.position.set(pos[0], 0.4, pos[1]);
        animal.add(leg);
    });
    
    animal.position.set(x, 0, z);
    animal.rotation.y = Math.random() * Math.PI * 2;
    parent.add(animal);
    animals.push({ mesh: animal, speed: 0.02 + Math.random() * 0.02 });
}

function createMountain(parent, x, z) {
    const height = 30 + Math.random() * 40;
    const geo = new THREE.ConeGeometry(40 + Math.random() * 30, height, 4);
    const mat = new THREE.MeshStandardMaterial({ 
        color: 0x555555,
        roughness: 0.9,
        flatShading: true
    });
    const mountain = new THREE.Mesh(geo, mat);
    mountain.position.set(x, height / 2 - 10, z);
    parent.add(mountain);
}

function updateWorldChunks() {
    const cx = Math.floor(car.position.x / CONFIG.chunkSize);
    const cz = Math.floor(car.position.z / CONFIG.chunkSize);
    
    // Load new chunks
    for (let x = cx - 2; x <= cx + 2; x++) {
        for (let z = cz - 2; z <= cz + 2; z++) {
            const key = `${x},${z}`;
            if (!chunks.has(key)) {
                chunks.set(key, generateChunk(x, z));
            }
        }
    }
    
    // Unload distant chunks
    for (const [key, chunk] of chunks) {
        const [ckx, ckz] = key.split(',').map(Number);
        if (Math.abs(ckx - cx) > 3 || Math.abs(ckz - cz) > 3) {
            scene.remove(chunk);
            chunks.delete(key);
        }
    }
}

function updatePhysics(dt) {
    // Input
    const acceleration = (keys['w'] || keys['arrowup']) ? CONFIG.car.acceleration : 0;
    const braking = (keys['s'] || keys['arrowdown']) ? CONFIG.car.braking : 0;
    const left = (keys['a'] || keys['arrowleft']) ? 1 : 0;
    const right = (keys['d'] || keys['arrowright']) ? 1 : 0;
    
    // Steering
    const targetSteering = (right - left) * CONFIG.car.turnSpeed;
    steering += (targetSteering - steering) * 5 * dt;
    
    // Speed
    if (acceleration > 0) {
        speed += acceleration * dt;
    } else if (braking > 0) {
        speed -= braking * dt;
    } else {
        speed *= CONFIG.car.friction;
    }
    
    // Limits
    speed = Math.max(-30, Math.min(CONFIG.car.maxSpeed / 3.6, speed)); // Convert km/h to m/s roughly
    
    // Apply movement
    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(car.quaternion);
    car.position.add(forward.multiplyScalar(speed * dt));
    
    // Rotation
    if (Math.abs(speed) > 0.1) {
        car.rotation.y -= steering * dt * (speed / 20);
    }
    
    // Wheel animation
    wheels.forEach((wheel, i) => {
        wheel.rotation.x += speed * dt * 2;
        if (i < 2) { // Front wheels steering
            wheel.rotation.y = -steering * 0.5;
        }
    });
    
    // Camera follow
    const relativeCameraOffset = new THREE.Vector3(0, 3, -8);
    const cameraOffset = relativeCameraOffset.applyMatrix4(car.matrixWorld);
    
    camera.position.lerp(cameraOffset, 5 * dt);
    camera.lookAt(car.position.x, car.position.y + 1, car.position.z + 10);
}

function updateDayNightCycle(dt) {
    gameTime += (dt * 1000) * (24 * 60 * 60 * 1000 / CONFIG.dayLength);
    gameTime = gameTime % (24 * 60 * 60 * 1000);
    
    const hours = gameTime / (60 * 60 * 1000);
    const sunAngle = (hours / 24) * Math.PI * 2 - Math.PI / 2;
    
    // Sun position
    sunLight.position.x = Math.cos(sunAngle) * 100;
    sunLight.position.y = Math.sin(sunAngle) * 100;
    sunLight.position.z = 50;
    
    // Light intensity based on time
    let sunIntensity = 0;
    let skyColor = 0x000000;
    
    if (hours > 5 && hours < 19) {
        sunIntensity = 1;
        skyColor = 0x87CEEB; // Day blue
        
        if (hours < 7) {
            sunIntensity = (hours - 5) / 2;
            skyColor = 0xFFD700; // Sunrise gold
        } else if (hours > 17) {
            sunIntensity = 1 - (hours - 17) / 2;
            skyColor = 0xFF6347; // Sunset orange
        }
    } else {
        skyColor = 0x000011; // Night
        moonLight.intensity = 0.3;
    }
    
    sunLight.intensity = Math.max(0, sunIntensity);
    moonLight.intensity = sunIntensity > 0 ? 0 : 0.3;
    
    scene.fog.color.setHex(skyColor);
    renderer.setClearColor(skyColor);
    
    // Auto headlights
    if (hours > 19 || hours < 6) {
        if (!headlightsOn && speed > 1) {
            toggleHeadlights();
        }
    } else if (hours > 7 && hours < 17 && headlightsOn) {
        toggleHeadlights();
    }
    
    // Update UI
    const h = Math.floor(hours);
    const m = Math.floor((hours - h) * 60);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const displayH = h % 12 || 12;
    const displayM = m.toString().padStart(2, '0');
    document.getElementById('time-display').textContent = `${displayH}:${displayM} ${ampm}`;
    document.getElementById('time-display').style.color = (hours > 6 && hours < 18) ? '#fbbf24' : '#60a5fa';
    
    isNight = hours < 6 || hours > 20;
}

function updateSpeedometer() {
    const kmh = Math.abs(Math.round(speed * 3.6));
    document.getElementById('speed-text').textContent = kmh;
    
    // Needle rotation (-135 to +135 degrees)
    const maxSpeed = 240;
    const angle = -135 + (kmh / maxSpeed) * 270;
    document.getElementById('needle').setAttribute('transform', `rotate(${angle} 50 50)`);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.1);
    
    updatePhysics(dt);
    updateDayNightCycle(dt);
    updateWorldChunks();
    updateSpeedometer();
    
    // Animate animals
    animals.forEach(animal => {
        if (Math.random() > 0.99) {
            animal.mesh.rotation.y += (Math.random() - 0.5);
        }
        animal.mesh.translateZ(animal.speed);
    });
    
    renderer.render(scene, camera);
}

// Draw speedometer ticks
function initSpeedometer() {
    const ticks = document.getElementById('ticks');
    for (let i = 0; i <= 12; i++) {
        const angle = -135 + (i * 270 / 12);
        const rad = angle * Math.PI / 180;
        const x1 = 50 + Math.cos(rad) * 35;
        const y1 = 50 + Math.sin(rad) * 35;
        const x2 = 50 + Math.cos(rad) * 40;
        const y2 = 50 + Math.sin(rad) * 40;
        
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#fff');
        line.setAttribute('stroke-width', '1');
        ticks.appendChild(line);
    }
}

initSpeedometer();
init();

</script>
</body>
</html>
